<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPFX Markets</title>
<link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0c;--bg2:#0e0e10;--fg:#fff;--muted:#a0a0a0;--muted2:#6a6a6a;
  --line:#2a2a2c;--cobalt:#2563eb;--cobalt-h:#1d4ed8;--green:#10b981;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--fg);display:flex;flex-direction:column;}

.topbar{display:flex;align-items:center;gap:.75rem;padding:0 1.25rem;height:52px;border-bottom:1px solid var(--line);flex-shrink:0;background:var(--bg2);}
.back-btn{display:flex;align-items:center;gap:.35rem;padding:.32rem .7rem;border-radius:6px;background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--muted);font-size:.78rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all .15s;white-space:nowrap;}
.back-btn:hover{color:var(--fg);border-color:rgba(255,255,255,.2);}
.back-btn svg{width:12px;height:12px;}
.tb-div{width:1px;height:22px;background:var(--line);flex-shrink:0;}
.tb-acct{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;white-space:nowrap;}
.tb-pill{display:flex;align-items:center;gap:.3rem;padding:.26rem .6rem;border-radius:5px;background:rgba(255,255,255,.04);border:1px solid var(--line);font-size:.72rem;color:var(--muted2);white-space:nowrap;}
.tb-pill strong{color:var(--fg);font-weight:600;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:.5rem;flex-shrink:0;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(16,185,129,.6);animation:pd 2s ease infinite;flex-shrink:0;}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.4}}
.live-lbl{font-size:.75rem;color:var(--green);font-weight:700;}

.layout{flex:1;display:flex;overflow:hidden;}

.wl{width:190px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column;transition:width .25s,min-width .25s;}
.wl.hidden{width:0;min-width:0;overflow:hidden;border-right:none;}
.wl-head{padding:.75rem 1rem .5rem;font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;flex-shrink:0;}
.wl-list{flex:1;overflow-y:auto;}
.wl-item{display:flex;align-items:center;justify-content:space-between;padding:.55rem 1rem;cursor:pointer;transition:background .1s;gap:.5rem;border-bottom:1px solid var(--line);}
.wl-item:last-child{border-bottom:none;}
.wl-item:hover{background:rgba(255,255,255,.04);}
.wl-item.active{background:rgba(37,99,235,.1);border-right:2px solid var(--cobalt);}
.wl-sym{font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:700;}
.wl-desc{font-size:.65rem;color:var(--muted2);margin-top:.1rem;}

.chart-wrap{flex:1;position:relative;overflow:hidden;}
#tv_chart_container{width:100%;height:100%;}

.wl-toggle{position:fixed;top:50%;left:190px;transform:translateY(-50%);z-index:200;width:16px;height:38px;background:var(--bg2);border:1px solid var(--line);border-left:none;border-radius:0 5px 5px 0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted2);transition:left .25s,color .15s;}
.wl-toggle:hover{color:var(--fg);}
.wl-toggle svg{width:9px;height:9px;transition:transform .25s;}
.wl.hidden~.wl-toggle{left:0;}
.wl.hidden~.wl-toggle svg{transform:rotate(180deg);}
</style>
</head>
<body>

<div class="topbar">
  <a href="dashboard.html" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Dashboard
  </a>
  <div class="tb-div"></div>
  <div class="tb-acct" id="tbAcct">IPFX Markets</div>
  <div class="tb-div"></div>
  <div class="tb-pill">Login&nbsp;<strong id="tbLogin">—</strong></div>
  <div class="tb-pill">Platform&nbsp;<strong id="tbPlatform">MT5</strong></div>
  <div class="tb-pill">Server&nbsp;<strong id="tbServer">IPFX-MT5-Live</strong></div>
  <div class="tb-right">
    <div class="live-dot"></div>
    <div class="live-lbl">Live</div>
  </div>
</div>

<div class="layout">
  <div class="wl" id="wlPanel">
    <div class="wl-head">Watchlist</div>
    <div class="wl-list" id="wlList"></div>
  </div>
  <div class="wl-toggle" id="wlToggle" onclick="toggleWl()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  </div>
  <div class="chart-wrap">
    <div id="tv_chart_container"></div>
  </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const params=new URLSearchParams(location.search);
document.getElementById('tbAcct').textContent=params.get('name')||'My Account';
document.getElementById('tbLogin').textContent=params.get('login')||'—';
document.getElementById('tbPlatform').textContent=params.get('platform')||'MT5';
document.getElementById('tbServer').textContent=params.get('server')||'IPFX-MT5-Live';
document.title='IPFX Markets | '+(params.get('name')||'Account');

const PAIRS=[
  {sym:'OANDA:EURUSD',label:'EUR/USD',desc:'Euro / US Dollar'},
  {sym:'OANDA:GBPUSD',label:'GBP/USD',desc:'Pound / US Dollar'},
  {sym:'OANDA:USDJPY',label:'USD/JPY',desc:'Dollar / Japanese Yen'},
  {sym:'OANDA:XAUUSD',label:'XAU/USD',desc:'Gold / US Dollar'},
  {sym:'OANDA:USDCAD',label:'USD/CAD',desc:'Dollar / Canadian Dollar'},
  {sym:'OANDA:AUDUSD',label:'AUD/USD',desc:'Aussie / US Dollar'},
  {sym:'OANDA:GBPJPY',label:'GBP/JPY',desc:'Pound / Japanese Yen'},
  {sym:'OANDA:EURJPY',label:'EUR/JPY',desc:'Euro / Japanese Yen'},
  {sym:'OANDA:USDCHF',label:'USD/CHF',desc:'Dollar / Swiss Franc'},
  {sym:'NASDAQ:NQ1!', label:'NAS100', desc:'Nasdaq 100 Futures'},
  {sym:'CME_MINI:ES1!',label:'S&P 500',desc:'S&P 500 Futures'},
  {sym:'OANDA:US30USD',label:'DOW 30', desc:'Dow Jones 30'},
  {sym:'OANDA:XAGUSD',label:'XAG/USD',desc:'Silver / US Dollar'},
  {sym:'NYMEX:CL1!',  label:'WTI Oil', desc:'Crude Oil Futures'},
  {sym:'CME:GC1!',    label:'Gold Fut',desc:'Gold Futures (CME)'},
];

let activeSym='OANDA:EURUSD';
let tvWidget=null;

function buildWl(){
  document.getElementById('wlList').innerHTML=PAIRS.map((p,i)=>`
    <div class="wl-item${i===0?' active':''}" onclick="changeSym('${p.sym}',this)">
      <div>
        <div class="wl-sym">${p.label}</div>
        <div class="wl-desc">${p.desc}</div>
      </div>
    </div>`).join('');
}

function changeSym(sym,el){
  activeSym=sym;
  document.querySelectorAll('.wl-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  if(tvWidget){tvWidget.setSymbol(sym,'60',function(){});}
}

function toggleWl(){
  document.getElementById('wlPanel').classList.toggle('hidden');
}

buildWl();

if(typeof TradingView!=='undefined'){
  tvWidget=new TradingView.widget({
    container_id:'tv_chart_container',
    autosize:true,
    symbol:activeSym,
    interval:'60',
    timezone:'Europe/London',
    theme:'dark',
    style:'1',
    locale:'en',
    toolbar_bg:'#0e0e10',
    enable_publishing:false,
    hide_side_toolbar:false,
    allow_symbol_change:true,
    save_image:true,
    studies:['RSI@tv-basicstudies','MACD@tv-basicstudies'],
    overrides:{
      'paneProperties.background':'#0a0a0c',
      'paneProperties.backgroundType':'solid',
      'scalesProperties.textColor':'#a0a0a0',
      'mainSeriesProperties.candleStyle.upColor':'#10b981',
      'mainSeriesProperties.candleStyle.downColor':'#ef4444',
      'mainSeriesProperties.candleStyle.borderUpColor':'#10b981',
      'mainSeriesProperties.candleStyle.borderDownColor':'#ef4444',
      'mainSeriesProperties.candleStyle.wickUpColor':'#10b981',
      'mainSeriesProperties.candleStyle.wickDownColor':'#ef4444',
    },
  });
} else {
  document.addEventListener('DOMContentLoaded',function(){
    tvWidget=new TradingView.widget({
      container_id:'tv_chart_container',
      autosize:true,symbol:activeSym,interval:'60',timezone:'Europe/London',
      theme:'dark',style:'1',locale:'en',toolbar_bg:'#0e0e10',
      enable_publishing:false,allow_symbol_change:true,save_image:true,
      studies:['RSI@tv-basicstudies','MACD@tv-basicstudies'],
      overrides:{'paneProperties.background':'#0a0a0c','paneProperties.backgroundType':'solid','scalesProperties.textColor':'#a0a0a0','mainSeriesProperties.candleStyle.upColor':'#10b981','mainSeriesProperties.candleStyle.downColor':'#ef4444','mainSeriesProperties.candleStyle.borderUpColor':'#10b981','mainSeriesProperties.candleStyle.borderDownColor':'#ef4444','mainSeriesProperties.candleStyle.wickUpColor':'#10b981','mainSeriesProperties.candleStyle.wickDownColor':'#ef4444'},
    });
  });
}
</script>
</body>
</html>
